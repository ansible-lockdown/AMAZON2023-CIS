---

# Set default value for reboot value
change_requires_reboot: false
# The role discovers dynamically (in tasks/main.yml) whether it
# is executed on a container image and sets the variable
# system_is_container the true. Otherwise, the default value
# 'false' is left unchanged.
system_is_container: false

min_ansible_version: 2.10.1
amzn2023cis_allowed_crypto_policies:
  - DEFAULT
  - FUTURE
  - FIPS

amzn2023cis_allowed_crypto_policies_modules:
  - OSPP
  - AD-SUPPORT
  - AD-SUPPORT-LEGACY
# Used to control warning summary
warn_control_list: ""
warn_count: 0

gpg_key_package: system-release

os_gpg_key_pubkey_name: gpg-pubkey-d832c631-6515c85e  # pragma: allowlist secret
os_gpg_key_pubkey_content: Amazon Linux <amazon-linux@amazon.com> d832c631

company_title: 'Mindpoint Group - A Tyto Athene Company'
file_managed_by_ansible: |-
  # File managed by ansible as part of {{ benchmark }} benchmark
  # As part of Ansible-lockdown
  # Provided by {{ company_title }}
