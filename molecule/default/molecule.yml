---

dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: amazon2023-cis
    image: robertdebock/amazonlinux:latest
    command: /usr/lib/systemd/systemd
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
provisioner:
  name: ansible
  env:
    ANSIBLE_PIPELINING: "true"
  playbooks:
    converge: converge.yml
    prepare: prepare.yml
    verify: verify.yml
  inventory:
    host_vars:
      amazon2023-cis:
        ansible_become: false
        system_is_container: true
        skip_reboot: true
        setup_audit: true
        run_audit: true
verifier:
  name: ansible
